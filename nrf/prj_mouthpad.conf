# MouthPad app extra config (nRF)
#
# Selects APP_TYPE=mouthpad (detected from this filename in CMakeLists.txt).
# Shares the base prj.conf (BLE central + TinyUSB device + NVS settings), which
# already provides everything the BT->USB path needs. The mouthpad app adds the
# NUS<->CDC relay on top of the standard bt2usb BLE-host configuration.
#
# (Intentionally minimal — board-specific settings live in boards/*.conf.)
CONFIG_BT_SETTINGS=y
