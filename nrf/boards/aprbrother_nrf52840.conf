# April Brother nRF52840 USB Dongle board-specific config
#
# Ships the Adafruit nRF52 UF2 bootloader (no SoftDevice; code at 0x1000).
# Zephyr's default DTS for nrf52840dongle uses MCUboot partitions — the overlay
# replaces them with the UF2 layout. This is the board sent to MouthPad users.
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_BOARD_HAS_NRF5_BOOTLOADER=n
